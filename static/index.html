<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ふわっち 自動録画 v21</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--card:#22263a;--border:#2e3250;--accent:#7c6aff;--accent2:#ff6b9d;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--text:#e8eaf6;--muted:#7b82a8;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;font-size:13px;min-height:100vh}
.layout{display:grid;grid-template-columns:230px 1fr;grid-template-rows:50px 1fr;min-height:100vh}
header{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 18px;z-index:10}
.logo{font-size:17px;font-weight:700;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:var(--muted);font-size:10px}
.spacer{flex:1}
#monitorBtn{padding:6px 16px;border-radius:18px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:.2s;background:var(--green);color:#fff}
#monitorBtn.active{background:var(--red)}
#monitorStatus{font-size:11px;color:var(--muted)}
aside{background:var(--surface);border-right:1px solid var(--border);padding:12px;overflow-y:auto}
main{padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:11px}
.sidebar-title{font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:7px}
.add-row{display:flex;gap:5px;margin-bottom:9px}
.add-row input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:6px 8px;color:var(--text);font-size:12px;outline:none}
.add-row input:focus{border-color:var(--accent)}
.add-row button{background:var(--accent);border:none;border-radius:7px;color:#fff;padding:6px 10px;cursor:pointer;font-size:15px;line-height:1}
.streamer-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:8px 10px;margin-bottom:6px}
.sc-top{display:flex;align-items:center;gap:6px}
.sc-name{flex:1;font-size:12px;font-weight:600;word-break:break-all}
.sc-badge{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
.sc-badge.live{background:var(--red);box-shadow:0 0 5px var(--red)}
.sc-actions{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap}
.btn-xs{padding:3px 8px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:10px}
.btn-xs:hover{background:var(--border)}
.btn-xs.danger{border-color:var(--red);color:var(--red)}
.btn-xs.danger:hover{background:var(--red);color:#fff}
.btn-xs.primary{border-color:var(--accent);color:var(--accent)}
.btn-xs.primary:hover{background:var(--accent);color:#fff}
.btn-xs.stop{border-color:var(--red);color:var(--red)}
.btn-xs.stop:hover{background:var(--red);color:#fff}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.card-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px;display:flex;align-items:center;gap:5px}
.stats-row{display:flex;gap:7px}
.stat-box{flex:1;background:var(--surface);border-radius:9px;padding:9px;text-align:center}
.stat-num{font-size:24px;font-weight:700;color:var(--accent)}
.stat-label{font-size:10px;color:var(--muted);margin-top:1px}
#recList{display:flex;flex-direction:column;gap:6px;max-height:130px;overflow-y:auto}
.rec-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.rec-dot{width:10px;height:10px;border-radius:50%;background:var(--red);box-shadow:0 0 5px var(--red);animation:pulse 1.2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.rec-info{flex:1}
.rec-user{font-weight:700;font-size:12px}
.rec-meta{font-size:10px;color:var(--muted);margin-top:1px;word-break:break-all}
.rec-btns{display:flex;gap:4px;flex-shrink:0}
.rec-stop{padding:4px 10px;border-radius:6px;border:1px solid var(--red);background:transparent;color:var(--red);cursor:pointer;font-size:10px}
.rec-stop:hover{background:var(--red);color:#fff}
.rec-view{padding:4px 10px;border-radius:6px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;font-size:10px}
.rec-view:hover{background:var(--accent);color:#fff}
.empty{color:var(--muted);font-size:11px;text-align:center;padding:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.log-wrap{height:190px;overflow-y:auto;font-family:'Cascadia Code','Consolas',monospace;font-size:11px;background:var(--surface);border-radius:7px;padding:7px;line-height:1.65}
.log-wrap::-webkit-scrollbar,.comment-wrap::-webkit-scrollbar{width:3px}
.log-wrap::-webkit-scrollbar-thumb,.comment-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.log-entry{display:flex;gap:6px}
.log-time{color:var(--muted);flex-shrink:0}
.log-msg{color:var(--text);word-break:break-all}
.log-entry.start .log-msg{color:var(--green)}
.log-entry.stop .log-msg,.log-entry.warn .log-msg{color:var(--yellow)}
.log-entry.comment .log-msg{color:#93c5fd}
/* コメントタブ */
.cmt-tabs{display:flex;gap:4px;flex-wrap:wrap;padding-bottom:6px;border-bottom:1px solid var(--border);margin-bottom:6px}
.tab-btn{padding:3px 9px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:10px;cursor:pointer;transition:.15s}
.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.comment-wrap{height:160px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.cmt-item{background:var(--surface);border-radius:5px;padding:3px 8px;display:flex;gap:6px;align-items:baseline}
.cmt-time{color:var(--muted);flex-shrink:0;font-size:10px}
.cmt-user{font-weight:600;flex-shrink:0;font-size:10px;cursor:pointer;text-decoration:underline dotted}
.cmt-user:hover{opacity:.8}
.cmt-user.normal{color:var(--accent)}
.cmt-user.item{color:var(--yellow)}
.cmt-uid{color:var(--muted);font-size:9px;flex-shrink:0}
.cmt-text{color:var(--text);word-break:break-all;font-size:11px}
/* 設定 */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.form-group{display:flex;flex-direction:column;gap:2px}
.form-group label{font-size:10px;color:var(--muted);font-weight:600}
.form-group input,.form-group select{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);font-size:12px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.dir-row{display:flex;gap:5px}
.dir-row input{flex:1}
.btn-browse{padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:11px;white-space:nowrap}
.btn-browse:hover{border-color:var(--accent);color:var(--accent)}
.btn-save{padding:6px 16px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:12px;font-weight:600}
.btn-folder{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:11px;margin-left:5px}
.btn-folder:hover{background:var(--border)}
.toggle-row{display:flex;align-items:center;gap:7px;margin-top:2px}
.toggle{position:relative;width:36px;height:19px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#444;border-radius:19px;cursor:pointer;transition:.2s}
.slider:before{content:'';position:absolute;width:13px;height:13px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
input:checked+.slider{background:var(--accent)}
input:checked+.slider:before{transform:translateX(17px)}
/* プレイヤーモーダル */
#playerModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:50;align-items:center;justify-content:center}
#playerModal.open{display:flex}
.player-box{background:var(--card);border-radius:12px;padding:16px;width:min(860px,95vw);max-height:95vh;display:flex;flex-direction:column;gap:10px}
.player-header{display:flex;align-items:center;gap:8px}
.player-title{font-weight:700;font-size:14px;flex:1}
.player-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1}
.player-close:hover{color:var(--text)}
#playerFrame{width:100%;aspect-ratio:16/9;border:none;border-radius:8px;background:#000}
/* トースト */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:12px;opacity:0;transition:.3s;pointer-events:none;z-index:99}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:var(--green);color:var(--green)}
#toast.err{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div class="layout">
<header>
  <span style="font-size:20px">📹</span>
  <div><div class="logo">ふわっち 自動録画</div><div class="subtitle">whowatch.tv recorder</div></div>
  <div class="spacer"></div>
  <span id="monitorStatus">停止中</span>
  <button id="monitorBtn" onclick="toggleMonitor()">▶ 自動監視 開始</button>
</header>

<aside>
  <div class="sidebar-title">📋 監視する配信者</div>
  <div class="add-row">
    <input id="addInput" type="text" placeholder="user_path (例: w:12345)"
           onkeydown="if(event.key==='Enter')addStreamer()">
    <button onclick="addStreamer()" title="追加">＋</button>
  </div>
  <div id="streamerList"></div>
</aside>

<main>
  <!-- 統計 -->
  <div class="stats-row">
    <div class="stat-box"><div class="stat-num" id="statStreamers">0</div><div class="stat-label">登録配信者</div></div>
    <div class="stat-box"><div class="stat-num" id="statRecording" style="color:var(--red)">0</div><div class="stat-label">録画中</div></div>
    <div class="stat-box"><div class="stat-num" id="statComments" style="color:#93c5fd">0</div><div class="stat-label">受信コメント</div></div>
  </div>

  <!-- 録画中 -->
  <div class="card">
    <div class="card-title">🔴 録画中</div>
    <div id="recList"><div class="empty">録画中の配信はありません</div></div>
  </div>

  <!-- ログ＋コメント -->
  <div class="grid2">
    <div class="card">
      <div class="card-title" style="justify-content:space-between">📄 ログ
        <button onclick="clearLog()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:10px">クリア</button>
      </div>
      <div class="log-wrap" id="logWrap"></div>
    </div>
    <div class="card">
      <div class="card-title" style="justify-content:space-between">💬 コメント
        <button onclick="clearComments()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:10px">クリア</button>
      </div>
      <div class="cmt-tabs" id="cmt-tabs">
        <button class="tab-btn active" data-lid="all" onclick="switchTab(this,'all')">全配信</button>
      </div>
      <div class="comment-wrap" id="commentWrap">
        <div class="empty">コメント待機中...</div>
      </div>
    </div>
  </div>

  <!-- 設定 -->
  <div class="card">
    <div class="card-title">⚙️ 設定</div>
    <div class="settings-grid">
      <div class="form-group">
        <label>チェック間隔（秒）</label>
        <input type="number" id="cfgInterval" min="5" max="300" value="30">
      </div>
      <div class="form-group">
        <label>録画画質</label>
        <select id="cfgQuality">
          <option value="1veryhigh">最高画質</option>
          <option value="2high" selected>高画質 (2high)</option>
          <option value="3medium">中画質</option>
          <option value="4low">低画質</option>
        </select>
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>保存フォルダ</label>
        <div class="dir-row">
          <input type="text" id="cfgOutputDir" placeholder="例: C:\Users\lange\Videos\whowatch">
          <button class="btn-browse" onclick="browseFolder()" title="フォルダを選択">📂 選択</button>
        </div>
      </div>
      <div class="form-group">
        <label>コメント保存</label>
        <div class="toggle-row">
          <label class="toggle"><input type="checkbox" id="cfgComments" checked><span class="slider"></span></label>
          <span id="cfgCommentsLabel">ON</span>
        </div>
      </div>
      <div class="form-group">
        <label>字幕埋め込み <span style="font-size:9px;color:var(--muted)">(録画後MP4生成)</span></label>
        <div class="toggle-row">
          <label class="toggle"><input type="checkbox" id="cfgEmbedSub"><span class="slider"></span></label>
          <span id="cfgEmbedSubLabel">OFF</span>
        </div>
      </div>
    </div>
    <div>
      <button class="btn-save" onclick="saveConfig()">💾 設定を保存</button>
      <button class="btn-folder" onclick="openFolder()">📁 フォルダを開く</button>
    </div>
  </div>
</main>
</div>

<!-- 配信プレイヤーモーダル -->
<div id="playerModal" onclick="if(event.target===this)closePlayer()">
  <div class="player-box">
    <div class="player-header">
      <span style="font-size:16px">📺</span>
      <span class="player-title" id="playerTitle">配信プレビュー</span>
      <button class="player-close" onclick="closePlayer()">✕</button>
    </div>
    <iframe id="playerFrame" allowfullscreen allow="autoplay"></iframe>
    <div style="font-size:10px;color:var(--muted);text-align:center">
      ※ ふわっちの配信ページを表示しています
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const socket = io();
let commentCount = 0, firstComment = true;
const allComments = {};
let activeLid = 'all';

// ── Socket.IO ──
socket.on('status', data => {
  renderStreamerList(data.streamers, data.recording);
  renderRecList(data.recording);
  renderConfig(data.config);
  document.getElementById('statStreamers').textContent = data.streamers.length;
  document.getElementById('statRecording').textContent  = data.recording.length;
});
socket.on('log', e => appendLog(e));
socket.on('comment', c => {
  if (firstComment) { document.getElementById('commentWrap').innerHTML=''; firstComment=false; }
  commentCount++;
  document.getElementById('statComments').textContent = commentCount;
  const lid = String(c.live_id || 'unknown');
  if (!allComments[lid]) { allComments[lid]=[]; addTab(lid); }
  allComments[lid].push(c);
  if (activeLid==='all' || activeLid===lid) appendCmt(c);
});

// ── コメントタブ ──
function addTab(lid) {
  const tabs = document.getElementById('cmt-tabs');
  if (tabs.querySelector(`[data-lid="${lid}"]`)) return;
  const btn = document.createElement('button');
  btn.className='tab-btn'; btn.dataset.lid=lid; btn.textContent=lid;
  btn.onclick = () => switchTab(btn, lid);
  tabs.appendChild(btn);
}
function switchTab(btn, lid) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); activeLid=lid;
  const wrap = document.getElementById('commentWrap');
  wrap.innerHTML='';
  const src = lid==='all'
    ? Object.values(allComments).flat().sort((a,b)=>a.time.localeCompare(b.time))
    : (allComments[lid]||[]);
  src.slice(-200).forEach(c=>appendCmt(c));
}
function appendCmt(c) {
  const wrap = document.getElementById('commentWrap');
  const hasItem = c.text && c.text.includes('🎁');
  const userPath = c.user_path || '';
  const uid = c.user_id ? `<span class="cmt-uid">#${c.user_id}</span>` : '';
  const el = document.createElement('div');
  el.className='cmt-item';
  el.innerHTML = `<span class="cmt-time">${c.time}</span>`
    + `<span class="cmt-user ${hasItem?'item':'normal'}" title="${esc(userPath)}" onclick="openProfile('${esc(userPath)}')">${esc(c.user)}</span>`
    + uid
    + `<span class="cmt-text">${esc(c.text)}</span>`;
  wrap.appendChild(el);
  wrap.scrollTop=wrap.scrollHeight;
  if(wrap.children.length>300) wrap.removeChild(wrap.firstChild);
}
function openProfile(userPath) {
  if (!userPath) return;
  // user_path例: "w:Nanoha_323" → https://whowatch.tv/profile/w:Nanoha_323
  // コロンはそのまま（encodeURIComponentするとふわっちが認識しない）
  const url = `https://whowatch.tv/profile/${userPath}`;
  window.open(url, '_blank');
}

// ── 配信プレイヤー ──
let currentLiveId = null;
function openPlayer(liveId, userPath) {
  currentLiveId = liveId;
  document.getElementById('playerTitle').textContent = `📺 ${userPath} (live_id: ${liveId})`;
  // ふわっちの配信ページをiframeで表示
  document.getElementById('playerFrame').src = `https://whowatch.tv/viewer/${liveId}`;
  document.getElementById('playerModal').classList.add('open');
}
function closePlayer() {
  document.getElementById('playerModal').classList.remove('open');
  document.getElementById('playerFrame').src = '';
}

// ── 監視ボタン ──
let _monitoring = false;
async function toggleMonitor() {
  _monitoring = !_monitoring;
  await post(_monitoring ? '/api/monitor/start' : '/api/monitor/stop', {});
  updateMonitorBtn();
}
function updateMonitorBtn() {
  const btn=document.getElementById('monitorBtn'), st=document.getElementById('monitorStatus');
  if (_monitoring) {
    btn.textContent='⏸ 自動監視 停止'; btn.classList.add('active');
    st.textContent='✅ 監視中'; st.style.color='var(--green)';
  } else {
    btn.textContent='▶ 自動監視 開始'; btn.classList.remove('active');
    st.textContent='停止中'; st.style.color='var(--muted)';
  }
}

// ── 配信者リスト ──
function renderStreamerList(streamers, recording) {
  const el=document.getElementById('streamerList');
  if (!streamers.length) {
    el.innerHTML='<div style="color:var(--muted);font-size:11px;text-align:center;padding:14px">配信者を追加してください</div>';
    return;
  }
  const recMap = {};
  recording.forEach(r => recMap[r.user_path] = r);
  el.innerHTML = streamers.map(up => {
    const rec = recMap[up];
    return `<div class="streamer-card">
      <div class="sc-top"><span class="sc-badge${rec?' live':''}"></span><span class="sc-name">${esc(up)}</span></div>
      <div class="sc-actions">
        <button class="btn-xs primary" onclick="testStreamer('${esc(up)}')">🔍 確認</button>
        ${rec
          ? `<button class="btn-xs primary" onclick="openPlayer('${rec.live_id}','${esc(up)}')">📺 視聴</button>
             <button class="btn-xs stop" onclick="stopRec('${esc(up)}')">⏹ 停止</button>`
          : `<button class="btn-xs primary" onclick="startRec('${esc(up)}')">▶ 録画</button>`}
        <button class="btn-xs danger" onclick="removeStreamer('${esc(up)}')">🗑 削除</button>
      </div></div>`;
  }).join('');
}

function renderRecList(recording) {
  const el=document.getElementById('recList');
  if (!recording.length) { el.innerHTML='<div class="empty">録画中の配信はありません</div>'; return; }
  el.innerHTML = recording.map(r=>`
    <div class="rec-item">
      <span class="rec-dot"></span>
      <div class="rec-info">
        <div class="rec-user">${esc(r.user_path)}</div>
        <div class="rec-meta">live_id: ${r.live_id} ｜ 開始: ${r.start_time}</div>
        <div class="rec-meta">${esc(r.video_file)}</div>
      </div>
      <div class="rec-btns">
        <button class="rec-view" onclick="openPlayer('${r.live_id}','${esc(r.user_path)}')">📺</button>
        <button class="rec-stop" onclick="stopRec('${esc(r.user_path)}')">⏹ 停止</button>
      </div>
    </div>`).join('');
}

function renderConfig(cfg) {
  if (!cfg) return;
  document.getElementById('cfgInterval').value = cfg.check_interval ?? 30;
  document.getElementById('cfgOutputDir').value = cfg.output_dir ?? '';
  document.getElementById('cfgQuality').value = cfg.quality ?? '2high';
  const sc = cfg.save_comments ?? true;
  document.getElementById('cfgComments').checked = sc;
  document.getElementById('cfgCommentsLabel').textContent = sc ? 'ON' : 'OFF';
  const es = cfg.embed_subtitles ?? false;
  document.getElementById('cfgEmbedSub').checked = es;
  document.getElementById('cfgEmbedSubLabel').textContent = es ? 'ON' : 'OFF';
}
document.getElementById('cfgComments').addEventListener('change',function(){
  document.getElementById('cfgCommentsLabel').textContent = this.checked?'ON':'OFF';
});
document.getElementById('cfgEmbedSub').addEventListener('change',function(){
  document.getElementById('cfgEmbedSubLabel').textContent = this.checked?'ON':'OFF';
});

// ── API ──
async function addStreamer() {
  const input=document.getElementById('addInput'), val=input.value.trim(); if(!val)return;
  const res=await post('/api/streamer/add',{user_path:val});
  if(res.ok){toast('追加: '+val,'ok');input.value='';}else toast(res.error||'エラー','err');
}
async function removeStreamer(up){if(!confirm(`${up} を削除?`))return;await post('/api/streamer/remove',{user_path:up});toast('削除','ok');}
async function testStreamer(up){toast('確認中...','');const res=await post('/api/streamer/test',{user_path:up});if(res.live)toast(`✅ 配信中 live_id=${res.live_id}`,'ok');else toast(`❌ オフライン: ${up}`,'err');}
async function startRec(up){await post('/api/record/start',{user_path:up});toast('録画開始','ok');}
async function stopRec(up){await post('/api/record/stop',{user_path:up});toast('停止','ok');}

async function browseFolder() {
  const res = await post('/api/browse_folder', {});
  if (res.path) document.getElementById('cfgOutputDir').value = res.path;
}

async function saveConfig(){
  const cfg={
    check_interval: parseInt(document.getElementById('cfgInterval').value),
    quality:        document.getElementById('cfgQuality').value,
    output_dir:     document.getElementById('cfgOutputDir').value,
    save_comments:  document.getElementById('cfgComments').checked,
    embed_subtitles:document.getElementById('cfgEmbedSub').checked,
  };
  const res=await post('/api/config/save',cfg);
  if(res.ok){
    toast('設定を保存しました','ok');
    // サーバーから返ってきた最新configで画面を再描画
    if(res.config) renderConfig(res.config);
  }
}
async function openFolder(){await post('/api/open_folder',{});}

// ── ログ ──
function appendLog(e){
  const wrap=document.getElementById('logWrap');
  const el=document.createElement('div');el.className=`log-entry ${e.level}`;
  el.innerHTML=`<span class="log-time">${e.time}</span><span class="log-msg">${esc(e.msg)}</span>`;
  wrap.appendChild(el);wrap.scrollTop=wrap.scrollHeight;
  if(wrap.children.length>300)wrap.removeChild(wrap.firstChild);
}
function clearLog(){document.getElementById('logWrap').innerHTML='';}
function clearComments(){
  document.getElementById('commentWrap').innerHTML='<div class="empty">コメント待機中...</div>';
  firstComment=true;commentCount=0;document.getElementById('statComments').textContent=0;
  Object.keys(allComments).forEach(k=>delete allComments[k]);
  const tabs=document.getElementById('cmt-tabs');
  Array.from(tabs.querySelectorAll('.tab-btn:not([data-lid="all"])')).forEach(b=>b.remove());
  switchTab(tabs.querySelector('[data-lid="all"]'),'all');
}

// ── ユーティリティ ──
async function post(url,body){const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return r.json();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let _tt;
function toast(msg,type){const e=document.getElementById('toast');e.textContent=msg;e.className=`show ${type}`;clearTimeout(_tt);_tt=setTimeout(()=>e.className=type,2500);}

// ── 初期ロード ──
(async()=>{
  const data=await fetch('/api/status').then(r=>r.json());
  renderStreamerList(data.streamers,data.recording);renderRecList(data.recording);renderConfig(data.config);
  document.getElementById('statStreamers').textContent=data.streamers.length;
  document.getElementById('statRecording').textContent=data.recording.length;
  const logs=await fetch('/api/logs').then(r=>r.json());logs.forEach(e=>appendLog(e));
})();
</script>
