<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ふわっち 自動録画</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--card:#22263a;--border:#2e3250;--accent:#7c6aff;--accent2:#ff6b9d;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--text:#e8eaf6;--muted:#7b82a8;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;font-size:13px;min-height:100vh}
.layout{display:grid;grid-template-columns:220px 1fr;grid-template-rows:50px 1fr;min-height:100vh}
header{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 16px;z-index:10}
.logo{font-size:16px;font-weight:700;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:var(--muted);font-size:10px}
.spacer{flex:1}
#monitorBtn{padding:6px 14px;border-radius:16px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:var(--green);color:#fff;transition:.2s}
#monitorBtn.active{background:var(--red)}
#monitorStatus{font-size:11px;color:var(--muted)}
aside{background:var(--surface);border-right:1px solid var(--border);padding:10px;overflow-y:auto}
main{padding:12px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}

/* サイドバー */
.sidebar-title{font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.add-row{display:flex;gap:4px;margin-bottom:8px}
.add-row input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:5px 7px;color:var(--text);font-size:11px;outline:none}
.add-row input:focus{border-color:var(--accent)}
.add-row button{background:var(--accent);border:none;border-radius:6px;color:#fff;padding:5px 9px;cursor:pointer;font-size:14px}
.streamer-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 9px;margin-bottom:5px}
.sc-top{display:flex;align-items:center;gap:5px}
.sc-name{flex:1;font-size:11px;font-weight:600;word-break:break-all}
.sc-badge{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0}
.sc-badge.live{background:var(--red);box-shadow:0 0 4px var(--red)}
.sc-actions{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap}
.btn-xs{padding:2px 7px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:10px}
.btn-xs:hover{background:var(--border)}
.btn-xs.danger{border-color:var(--red);color:var(--red)}
.btn-xs.danger:hover{background:var(--red);color:#fff}
.btn-xs.primary{border-color:var(--accent);color:var(--accent)}
.btn-xs.primary:hover{background:var(--accent);color:#fff}
.btn-xs.stop{border-color:var(--red);color:var(--red)}
.btn-xs.stop:hover{background:var(--red);color:#fff}

/* カード */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:11px}
.card-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;display:flex;align-items:center;gap:5px}

/* 統計 */
.stats-row{display:flex;gap:6px}
.stat-box{flex:1;background:var(--surface);border-radius:8px;padding:8px;text-align:center}
.stat-num{font-size:22px;font-weight:700;color:var(--accent)}
.stat-label{font-size:9px;color:var(--muted);margin-top:1px}

/* 配信タブ */
.live-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.live-tab{padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:11px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px}
.live-tab:hover{border-color:var(--accent);color:var(--text)}
.live-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.live-tab .tab-dot{width:6px;height:6px;border-radius:50%;background:var(--red);box-shadow:0 0 4px var(--red);animation:pulse 1.2s infinite}
.live-tab .tab-viewers{font-size:10px;opacity:.8}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* 配信パネル */
.live-panel{display:none}
.live-panel.active{display:flex;flex-direction:column;gap:10px}

/* 配信ヘッダー */
.live-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:10px}
.live-header-info{flex:1}
.live-header-user{font-weight:700;font-size:13px}
.live-header-meta{font-size:10px;color:var(--muted);margin-top:2px}
.live-header-viewers{text-align:center;min-width:80px}
.viewers-current{font-size:20px;font-weight:700;color:var(--green)}
.viewers-total{font-size:10px;color:var(--muted)}
.live-header-btns{display:flex;gap:5px}

/* グリッド */
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* ログ */
.log-wrap{height:200px;overflow-y:auto;font-family:'Cascadia Code','Consolas',monospace;font-size:11px;background:var(--surface);border-radius:7px;padding:7px;line-height:1.65}
.log-wrap::-webkit-scrollbar,.comment-wrap::-webkit-scrollbar{width:3px}
.log-wrap::-webkit-scrollbar-thumb,.comment-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.log-entry{display:flex;gap:6px}
.log-time{color:var(--muted);flex-shrink:0}
.log-msg{color:var(--text);word-break:break-all}
.log-entry.start .log-msg{color:var(--green)}
.log-entry.stop .log-msg,.log-entry.warn .log-msg{color:var(--yellow)}
.log-entry.comment .log-msg{color:#93c5fd}

/* コメント */
.cmt-tabs{display:flex;gap:4px;flex-wrap:wrap;padding-bottom:6px;border-bottom:1px solid var(--border);margin-bottom:6px}
.tab-btn{padding:2px 8px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:10px;cursor:pointer;transition:.15s}
.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.comment-wrap{height:170px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.cmt-item{background:var(--surface);border-radius:4px;padding:3px 7px;display:flex;gap:5px;align-items:baseline}
.cmt-time{color:var(--muted);flex-shrink:0;font-size:10px}
.cmt-user{font-weight:600;flex-shrink:0;font-size:10px;cursor:pointer;text-decoration:underline dotted}
.cmt-user.normal{color:var(--accent)}
.cmt-user.item{color:var(--yellow)}
.cmt-uid{color:var(--muted);font-size:9px;flex-shrink:0}
.cmt-text{color:var(--text);word-break:break-all;font-size:11px}

/* NGワードパネル */
.ng-panel{display:none;margin-bottom:8px;padding:8px;background:var(--surface);border-radius:6px;border:1px solid var(--red)}

/* リスナーパネル */
.listener-tabs{display:flex;gap:4px;flex-wrap:wrap;max-height:56px;overflow-y:auto;padding-bottom:6px;border-bottom:1px solid var(--border);margin-bottom:6px}

/* アイテム集計 */
#itemSummaryCard{display:none}

/* 設定 */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.form-group{display:flex;flex-direction:column;gap:2px}
.form-group label{font-size:10px;color:var(--muted);font-weight:600}
.form-group input,.form-group select{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);font-size:12px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.dir-row{display:flex;gap:4px}
.dir-row input{flex:1}
.btn-browse{padding:6px 9px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:10px}
.btn-browse:hover{border-color:var(--accent);color:var(--accent)}
.btn-save{padding:6px 14px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:11px;font-weight:600}
.btn-folder{padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:10px;margin-left:4px}
.toggle-row{display:flex;align-items:center;gap:7px;margin-top:2px}
.toggle{position:relative;width:34px;height:18px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#444;border-radius:18px;cursor:pointer;transition:.2s}
.slider:before{content:'';position:absolute;width:12px;height:12px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
input:checked+.slider{background:var(--accent)}
input:checked+.slider:before{transform:translateX(16px)}

/* トースト */
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:11px;opacity:0;transition:.3s;pointer-events:none;z-index:99}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:var(--green);color:var(--green)}
#toast.err{border-color:var(--red);color:var(--red)}
.empty{color:var(--muted);font-size:11px;text-align:center;padding:12px}
</style>
</head>
<body>
<div class="layout">
<header>
  <span style="font-size:18px">📹</span>
  <div><div class="logo">ふわっち 自動録画</div><div class="subtitle">whowatch.tv recorder</div></div>
  <div class="spacer"></div>
  <span id="monitorStatus">停止中</span>
  <button id="monitorBtn" onclick="toggleMonitor()">▶ 自動監視 開始</button>
</header>

<aside>
  <div class="sidebar-title">📋 監視する配信者</div>
  <div class="add-row">
    <input id="addInput" type="text" placeholder="user_path (例: w:12345)"
           onkeydown="if(event.key==='Enter')addStreamer()">
    <button onclick="addStreamer()" title="追加">＋</button>
  </div>
  <div id="streamerList"></div>
</aside>

<main>
  <!-- 統計 -->
  <div class="stats-row">
    <div class="stat-box"><div class="stat-num" id="statStreamers">0</div><div class="stat-label">登録配信者</div></div>
    <div class="stat-box"><div class="stat-num" id="statRecording" style="color:var(--red)">0</div><div class="stat-label">録画中</div></div>
    <div class="stat-box"><div class="stat-num" id="statComments" style="color:#93c5fd">0</div><div class="stat-label">受信コメント</div></div>
    <div class="stat-box"><div class="stat-num" id="statListenersCurrent" style="color:var(--green)">0</div><div class="stat-label">現在の視聴者</div></div>
    <div class="stat-box"><div class="stat-num" id="statListenersTotal" style="color:var(--yellow)">0</div><div class="stat-label">累計視聴者</div></div>
  </div>

  <!-- 配信タブ -->
  <div class="live-tabs" id="liveTabs">
    <div style="color:var(--muted);font-size:11px;padding:5px">録画中の配信はありません</div>
  </div>

  <!-- 配信パネル（配信ごとに生成） -->
  <div id="livePanels"></div>

  <!-- アイテム集計（全体） -->
  <div class="card" id="itemSummaryCard">
    <div class="card-title" style="justify-content:space-between">🎁 アイテム集計（全リスナー）
      <button onclick="document.getElementById('itemSummaryCard').style.display='none'" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:10px">閉じる</button>
    </div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:11px">
        <thead><tr style="color:var(--muted);border-bottom:1px solid var(--border)">
          <th style="text-align:left;padding:3px 7px">リスナー</th>
          <th style="text-align:left;padding:3px 7px">配信者</th>
          <th style="text-align:left;padding:3px 7px">アイテム</th>
          <th style="text-align:right;padding:3px 7px">合計</th>
        </tr></thead>
        <tbody id="itemSummaryBody"></tbody>
      </table>
    </div>
  </div>

  <!-- ログ（全体） -->
  <div class="card">
    <div class="card-title" style="justify-content:space-between">📄 システムログ
      <button onclick="clearLog()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:10px">クリア</button>
    </div>
    <div class="log-wrap" id="logWrap"></div>
  </div>

  <!-- 設定 -->
  <div class="card">
    <div class="card-title">⚙️ 設定</div>
    <div class="settings-grid">
      <div class="form-group">
        <label>チェック間隔（秒）</label>
        <input type="number" id="cfgInterval" min="5" max="300" value="30">
      </div>
      <div class="form-group">
        <label>録画画質</label>
        <select id="cfgQuality">
          <option value="1veryhigh">最高画質</option>
          <option value="2high" selected>高画質 (2high)</option>
          <option value="3medium">中画質</option>
          <option value="4low">低画質</option>
        </select>
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>保存フォルダ</label>
        <div class="dir-row">
          <input type="text" id="cfgOutputDir" placeholder="C:\Users\...\whowatch">
          <button class="btn-browse" onclick="browseFolder()">📂 選択</button>
        </div>
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>ふわっちCookie <span style="font-size:9px;color:var(--muted)">(モグリン禁止配信の録画に必要)</span></label>
        <input type="password" id="cfgCookie" placeholder="Cookie全文を貼り付け">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>X-Whowatch-Device-Id</label>
        <input type="text" id="cfgDeviceId" placeholder="例: 1683643598784-10573689">
      </div>
      <div class="form-group">
        <label>コメント保存</label>
        <div class="toggle-row">
          <label class="toggle"><input type="checkbox" id="cfgComments" checked><span class="slider"></span></label>
          <span id="cfgCommentsLabel">ON</span>
        </div>
      </div>
      <div class="form-group">
        <label>字幕埋め込み <span style="font-size:9px;color:var(--muted)">(録画後MP4生成)</span></label>
        <div class="toggle-row">
          <label class="toggle"><input type="checkbox" id="cfgEmbedSub" checked><span class="slider"></span></label>
          <span id="cfgEmbedSubLabel">ON</span>
        </div>
      </div>
      <div class="form-group">
        <label>MEGAへ自動アップロード</label>
        <div class="toggle-row">
          <label class="toggle"><input type="checkbox" id="cfgMegaUpload"><span class="slider"></span></label>
          <span id="cfgMegaUploadLabel">OFF</span>
        </div>
      </div>
      <div class="form-group">
        <label>MEGAフォルダ</label>
        <input type="text" id="cfgMegaFolder" placeholder="/whowatch" value="/whowatch">
      </div>
    </div>
    <div>
      <button class="btn-save" onclick="saveConfig()">💾 設定を保存</button>
      <button class="btn-folder" onclick="openFolder()">📁 フォルダを開く</button>
    </div>
  </div>
</main>
</div>
<div id="toast"></div>

<script>
const socket = io();
let commentCount = 0;
let _monitoring = false;

// ── データ管理 ──
const allComments    = {};   // live_id -> [{time,user,text,...}]
const listenerData   = {};   // ukey -> {name,path,streamer,comments,items}
const viewerCounts   = {};   // live_id -> {view_count, total_view_count}
const liveInfo       = {};   // user_path -> {live_id, start_time, video_file}
let   activeListener = null;
let   totalListeners = 0;

// NGワード
let ngWords = JSON.parse(localStorage.getItem('ngWords')||'[]');

// ── Socket.IO ──
socket.on('status', data => {
  renderStreamerList(data.streamers, data.recording);
  renderConfig(data.config);
  document.getElementById('statStreamers').textContent = data.streamers.length;
  document.getElementById('statRecording').textContent  = data.recording.length;
  // 配信タブ更新
  updateLiveTabs(data.recording);
});

socket.on('log', e => appendLog(e));

socket.on('comment', c => {
  commentCount++;
  document.getElementById('statComments').textContent = commentCount;

  const lid = String(c.live_id || 'unknown');
  if (!allComments[lid]) allComments[lid] = [];
  allComments[lid].push(c);

  // NGチェック
  const isNG = isNgComment(c.text);

  // リスナー管理
  const ukey = c.user_path ? `${c.user_path}__${c.user}` : c.user;
  if (!listenerData[ukey]) {
    listenerData[ukey] = {name:c.user, path:c.user_path||'', streamer:c.streamer||'', comments:[], items:{}};
    addListenerTab(ukey, lid);
    totalListeners++;
  }
  if (isNG) {
    listenerData[ukey].comments.push({time:c.time, text:`🚫[NG] ${c.text}`, live_id:lid});
  } else {
    listenerData[ukey].comments.push({time:c.time, text:c.text, live_id:lid});
    // アイテム集計
    const itemRegex = /🎁([^🎁×\s][^🎁×]*)(?:×(\d+))?/g;
    let im;
    while ((im = itemRegex.exec(c.text)) !== null) {
      const iname = im[1].trim();
      const icount = im[2] ? parseInt(im[2]) : 1;
      if (iname) listenerData[ukey].items[iname] = (listenerData[ukey].items[iname]||0) + icount;
    }
  }
  updateListenerTab(ukey);
  updateListenerStats();

  // コメント表示（NGは非表示）
  if (!isNG) {
    appendCmtToPanel(lid, c);
  }
});

socket.on('viewer_count', d => {
  viewerCounts[d.live_id] = d;
  updateViewerDisplay(d.live_id, d.view_count, d.total_view_count);
  // 全配信合計を統計に表示
  let cur = 0, tot = 0;
  Object.values(viewerCounts).forEach(v => { cur += v.view_count; tot += v.total_view_count; });
  document.getElementById('statListenersCurrent').textContent = cur;
  document.getElementById('statListenersTotal').textContent = tot;
});

// ── 配信タブ管理 ──
let currentLivePanels = {}; // user_path -> live_id

function updateLiveTabs(recording) {
  const tabs   = document.getElementById('liveTabs');
  const panels = document.getElementById('livePanels');

  // 録画終了したパネルを削除
  Object.keys(currentLivePanels).forEach(up => {
    if (!recording.find(r => r.user_path === up)) {
      document.getElementById(`tab-${CSS.escape(up)}`)?.remove();
      document.getElementById(`panel-${CSS.escape(up)}`)?.remove();
      delete currentLivePanels[up];
    }
  });

  if (!recording.length) {
    tabs.innerHTML = '<div style="color:var(--muted);font-size:11px;padding:5px">録画中の配信はありません</div>';
    return;
  }

  // タブとパネルを追加
  recording.forEach(r => {
    if (currentLivePanels[r.user_path]) return; // 既存
    currentLivePanels[r.user_path] = r.live_id;
    liveInfo[r.user_path] = r;

    // タブを削除してから再構築
    const emptyMsg = tabs.querySelector('div');
    if (emptyMsg) emptyMsg.remove();

    // タブ
    const tab = document.createElement('button');
    tab.id = `tab-${r.user_path}`;
    tab.className = 'live-tab' + (Object.keys(currentLivePanels).length === 1 ? ' active' : '');
    tab.dataset.up = r.user_path;
    tab.innerHTML = `<span class="tab-dot"></span>${esc(r.user_path)}<span class="tab-viewers" id="tab-viewers-${esc(r.live_id)}">👁 0</span>`;
    tab.onclick = () => switchLiveTab(r.user_path);
    tabs.appendChild(tab);

    // パネル
    const panel = document.createElement('div');
    panel.id = `panel-${r.user_path}`;
    panel.className = 'live-panel' + (Object.keys(currentLivePanels).length === 1 ? ' active' : '');
    panel.dataset.lid = r.live_id;
    panel.innerHTML = `
      <!-- 配信ヘッダー -->
      <div class="live-header">
        <div class="live-header-info">
          <div class="live-header-user">${esc(r.user_path)}</div>
          <div class="live-header-meta">live_id: ${r.live_id} ｜ 開始: ${r.start_time}</div>
          <div class="live-header-meta" style="word-break:break-all">${esc(r.video_file)}</div>
        </div>
        <div class="live-header-viewers">
          <div class="viewers-current" id="vc-cur-${r.live_id}">0</div>
          <div class="viewers-total" id="vc-tot-${r.live_id}">累計 0人</div>
          <div style="font-size:9px;color:var(--muted);margin-top:2px">視聴者</div>
        </div>
        <div class="live-header-btns">
          <button class="btn-xs primary" onclick="window.open('https://whowatch.tv/viewer/${r.live_id}','_blank')">📺 視聴</button>
          <button class="btn-xs stop" onclick="stopRec('${esc(r.user_path)}')">⏹ 停止</button>
        </div>
      </div>
      <!-- コメント＋リスナー -->
      <div class="grid3">
        <!-- コメント -->
        <div class="card" style="grid-column:1/3">
          <div class="card-title" style="justify-content:space-between">
            💬 コメント
            <div style="display:flex;gap:5px;align-items:center">
              <button onclick="toggleNgPanel('${esc(r.user_path)}')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:10px">🚫 NG</button>
              <button onclick="clearPanelComments('${esc(r.user_path)}')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:10px">クリア</button>
            </div>
          </div>
          <div class="ng-panel" id="ng-panel-${r.user_path}">
            <div style="font-size:10px;color:var(--red);margin-bottom:4px">🚫 NGワード</div>
            <div style="display:flex;gap:4px;margin-bottom:5px">
              <input id="ng-input-${r.user_path}" type="text" placeholder="NGワードを入力..."
                style="flex:1;background:var(--card);border:1px solid var(--border);border-radius:4px;padding:3px 7px;color:var(--text);font-size:10px;outline:none"
                onkeydown="if(event.key==='Enter')addNgWord()">
              <button onclick="addNgWord()" style="background:var(--red);border:none;border-radius:4px;color:#fff;padding:3px 8px;cursor:pointer;font-size:10px">追加</button>
            </div>
            <div id="ngList" style="display:flex;gap:3px;flex-wrap:wrap"></div>
          </div>
          <div class="comment-wrap" id="cmtWrap-${r.live_id}">
            <div class="empty">コメント待機中...</div>
          </div>
        </div>
        <!-- リスナー -->
        <div class="card">
          <div class="card-title" style="justify-content:space-between">
            👤 リスナー
            <div style="display:flex;gap:4px;align-items:center">
              <select onchange="sortListenerTabs()" id="listenerSort" style="background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:2px 5px;font-size:9px">
                <option value="recent">最新順</option>
                <option value="count">コメント数順</option>
                <option value="item">アイテム数順</option>
              </select>
              <button onclick="showItemSummary()" style="background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2px 6px;color:var(--yellow);cursor:pointer;font-size:10px">🎁</button>
            </div>
          </div>
          <input type="text" id="cmtSearch" placeholder="🔍 検索..." oninput="searchComments()"
            style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:3px 7px;color:var(--text);font-size:10px;outline:none;margin-bottom:5px">
          <div class="listener-tabs" id="listener-tabs">
            <span style="color:var(--muted);font-size:10px">コメント待機中...</span>
          </div>
          <div class="comment-wrap" id="listenerWrap">
            <div class="empty">リスナーを選択してください</div>
          </div>
        </div>
      </div>`;
    panels.appendChild(panel);
  });
}

function switchLiveTab(up) {
  document.querySelectorAll('.live-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.live-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${up}`)?.classList.add('active');
  document.getElementById(`panel-${up}`)?.classList.add('active');
}

function updateViewerDisplay(lid, cur, tot) {
  const c = document.getElementById(`vc-cur-${lid}`);
  const t = document.getElementById(`vc-tot-${lid}`);
  const tv = document.getElementById(`tab-viewers-${lid}`);
  if (c) c.textContent = cur;
  if (t) t.textContent = `累計 ${tot}人`;
  if (tv) tv.textContent = `👁 ${cur}`;
}

function appendCmtToPanel(lid, c) {
  const wrap = document.getElementById(`cmtWrap-${lid}`);
  if (!wrap) return;
  // 「コメント待機中...」を削除
  const empty = wrap.querySelector('.empty');
  if (empty) empty.remove();
  const hasItem = c.text && c.text.includes('🎁');
  const el = document.createElement('div');
  el.className = 'cmt-item';
  const upath = c.user_path || '';
  el.innerHTML = `<span class="cmt-time">${c.time}</span>`
    + `<span class="cmt-user ${hasItem?'item':'normal'}" onclick="openProfile('${esc(upath)}')" title="${esc(upath)}">${esc(c.user)}</span>`
    + (c.user_id ? `<span class="cmt-uid">#${c.user_id}</span>` : '')
    + `<span class="cmt-text">${esc(c.text)}</span>`;
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
  if (wrap.children.length > 300) wrap.removeChild(wrap.firstChild);
}

function openProfile(up) {
  if (!up) return;
  window.open(`https://whowatch.tv/profile/${up}`, '_blank');
}

function clearPanelComments(up) {
  const r = liveInfo[up];
  if (!r) return;
  const wrap = document.getElementById(`cmtWrap-${r.live_id}`);
  if (wrap) wrap.innerHTML = '<div class="empty">コメント待機中...</div>';
}

// ── リスナー管理 ──
function addListenerTab(ukey, lid) {
  const tabs = document.getElementById('listener-tabs');
  if (!tabs) return;
  const empty = tabs.querySelector('span');
  if (empty) empty.remove();
  if (tabs.querySelector(`[data-ukey="${ukey}"]`)) return;
  const btn = document.createElement('button');
  btn.className = 'tab-btn';
  btn.dataset.ukey = ukey;
  btn.onclick = () => switchListenerTab(btn, ukey);
  updateListenerTabLabel(btn, ukey);
  tabs.appendChild(btn);
}

function updateListenerTab(ukey) {
  const btn = document.querySelector(`[data-ukey="${ukey}"]`);
  if (btn) updateListenerTabLabel(btn, ukey);
}

function updateListenerTabLabel(btn, ukey) {
  const d = listenerData[ukey];
  const ic = Object.values(d.items).reduce((a,b)=>a+b,0);
  btn.textContent = `${d.name} ${d.comments.length}件${ic>0?' 🎁'+ic:''}`;
}

function switchListenerTab(btn, ukey) {
  document.querySelectorAll('#listener-tabs .tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeListener = ukey;
  const wrap = document.getElementById('listenerWrap');
  if (!wrap) return;
  wrap.innerHTML = '';
  const d = listenerData[ukey];
  if (Object.keys(d.items).length > 0) {
    const s = document.createElement('div');
    s.style.cssText = 'background:var(--surface);border-radius:4px;padding:3px 7px;margin-bottom:4px;font-size:10px';
    let t = '';
    if (d.streamer) t += `<span style="color:var(--muted)">配信: ${esc(d.streamer)}</span>  `;
    t += `<span style="color:var(--yellow)">🎁 ${Object.entries(d.items).map(([k,v])=>`${k}×${v}`).join('  ')}</span>`;
    s.innerHTML = t; wrap.appendChild(s);
  }
  const q = document.getElementById('cmtSearch')?.value.toLowerCase()||'';
  d.comments.filter(c=>!q||c.text.toLowerCase().includes(q)).forEach(c=>appendListenerCmt(c));
}

function appendListenerCmt(c) {
  const wrap = document.getElementById('listenerWrap');
  if (!wrap) return;
  const el = document.createElement('div');
  el.className = 'cmt-item';
  const q = document.getElementById('cmtSearch')?.value||'';
  const text = q ? c.text.replace(new RegExp(q,'gi'),m=>`<mark style="background:var(--yellow);color:#000">${m}</mark>`) : esc(c.text);
  el.innerHTML = `<span class="cmt-time">${c.time}</span><span class="cmt-text">${text}</span>`;
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
}

function searchComments() {
  if (activeListener) switchListenerTab(document.querySelector(`[data-ukey="${activeListener}"]`), activeListener);
}

function sortListenerTabs() {
  const sort = document.getElementById('listenerSort')?.value||'recent';
  const tabs = document.getElementById('listener-tabs');
  if (!tabs) return;
  const btns = Array.from(tabs.querySelectorAll('.tab-btn'));
  btns.sort((a,b) => {
    const da=listenerData[a.dataset.ukey], db=listenerData[b.dataset.ukey];
    if (sort==='count') return db.comments.length - da.comments.length;
    if (sort==='item') return Object.values(db.items).reduce((x,y)=>x+y,0) - Object.values(da.items).reduce((x,y)=>x+y,0);
    const at=da.comments.slice(-1)[0]?.time||'', bt=db.comments.slice(-1)[0]?.time||'';
    return bt.localeCompare(at);
  });
  btns.forEach(b=>tabs.appendChild(b));
}

function updateListenerStats() {
  document.getElementById('statListenersCurrent').textContent =
    Object.keys(listenerData).filter(k => {
      const last = listenerData[k].comments.slice(-1)[0];
      if (!last) return false;
      const [h,m,s] = last.time.split(':').map(Number);
      const t = new Date(); t.setHours(h,m,s,0);
      return (new Date()-t) < 5*60*1000;
    }).length;
}

// ── アイテム集計 ──
function showItemSummary() {
  const card = document.getElementById('itemSummaryCard');
  const tbody = document.getElementById('itemSummaryBody');
  tbody.innerHTML = '';
  const rows = Object.entries(listenerData)
    .filter(([,d])=>Object.keys(d.items).length>0)
    .sort((a,b)=>Object.values(b[1].items).reduce((x,y)=>x+y,0)-Object.values(a[1].items).reduce((x,y)=>x+y,0));
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="4" style="padding:7px;color:var(--muted);text-align:center">アイテムなし</td></tr>';
  } else {
    rows.forEach(([,d]) => {
      const total = Object.values(d.items).reduce((x,y)=>x+y,0);
      const tr = document.createElement('tr');
      tr.style.borderBottom = '1px solid var(--border)';
      tr.innerHTML = `<td style="padding:3px 7px;color:var(--accent)">${esc(d.name)}</td>
        <td style="padding:3px 7px;color:var(--muted);font-size:10px">${esc(d.streamer||'')}</td>
        <td style="padding:3px 7px;color:var(--yellow)">🎁 ${Object.entries(d.items).map(([k,v])=>`${k}×${v}`).join('  ')}</td>
        <td style="padding:3px 7px;text-align:right">${total}</td>`;
      tbody.appendChild(tr);
    });
  }
  card.style.display = card.style.display==='none' ? 'block' : 'none';
}

// ── NGワード ──
function toggleNgPanel(up) {
  const p = document.getElementById(`ng-panel-${up}`);
  if (p) { p.style.display = p.style.display==='none'?'block':'none'; renderNgList(); }
}
function renderNgList() {
  const el = document.getElementById('ngList');
  if (!el) return;
  el.innerHTML = ngWords.map((w,i)=>
    `<span style="background:var(--card);border:1px solid var(--red);border-radius:3px;padding:1px 5px;font-size:10px;color:var(--red);display:inline-flex;align-items:center;gap:3px">
      ${esc(w)}<button onclick="removeNgWord(${i})" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:9px;padding:0">✕</button>
    </span>`).join('');
}
function addNgWord() {
  const inputs = document.querySelectorAll('[id^="ng-input-"]');
  let w = '';
  inputs.forEach(i => { if (i.value.trim()) w = i.value.trim(); });
  if (!w || ngWords.includes(w)) return;
  ngWords.push(w);
  localStorage.setItem('ngWords', JSON.stringify(ngWords));
  inputs.forEach(i => i.value = '');
  renderNgList();
}
function removeNgWord(i) {
  ngWords.splice(i,1);
  localStorage.setItem('ngWords', JSON.stringify(ngWords));
  renderNgList();
}
function isNgComment(text) {
  return ngWords.some(w=>text.toLowerCase().includes(w.toLowerCase()));
}

// ── 監視ボタン ──
async function toggleMonitor() {
  _monitoring = !_monitoring;
  await post(_monitoring ? '/api/monitor/start' : '/api/monitor/stop', {});
  updateMonitorBtn();
}
function updateMonitorBtn() {
  const btn=document.getElementById('monitorBtn'), st=document.getElementById('monitorStatus');
  if (_monitoring) {
    btn.textContent='⏸ 自動監視 停止'; btn.classList.add('active');
    st.textContent='✅ 監視中'; st.style.color='var(--green)';
  } else {
    btn.textContent='▶ 自動監視 開始'; btn.classList.remove('active');
    st.textContent='停止中'; st.style.color='var(--muted)';
  }
}

// ── 配信者リスト ──
function renderStreamerList(streamers, recording) {
  const el=document.getElementById('streamerList');
  if (!streamers.length) {
    el.innerHTML='<div style="color:var(--muted);font-size:10px;text-align:center;padding:12px">配信者を追加してください</div>';
    return;
  }
  const recMap = {};
  recording.forEach(r=>recMap[r.user_path]=r);
  el.innerHTML = streamers.map(up => {
    const rec=recMap[up];
    return `<div class="streamer-card">
      <div class="sc-top"><span class="sc-badge${rec?' live':''}"></span><span class="sc-name">${esc(up)}</span></div>
      <div class="sc-actions">
        <button class="btn-xs primary" onclick="testStreamer('${esc(up)}')">🔍 確認</button>
        ${rec
          ? `<button class="btn-xs stop" onclick="stopRec('${esc(up)}')">⏹ 停止</button>`
          : `<button class="btn-xs primary" onclick="startRec('${esc(up)}')">▶ 録画</button>`}
        <button class="btn-xs danger" onclick="removeStreamer('${esc(up)}')">🗑 削除</button>
      </div></div>`;
  }).join('');
}

function renderConfig(cfg) {
  if (!cfg) return;
  document.getElementById('cfgInterval').value  = cfg.check_interval ?? 30;
  document.getElementById('cfgOutputDir').value = cfg.output_dir ?? '';
  document.getElementById('cfgQuality').value   = cfg.quality ?? '2high';
  const sc=cfg.save_comments??true;
  document.getElementById('cfgComments').checked=sc;
  document.getElementById('cfgCommentsLabel').textContent=sc?'ON':'OFF';
  const es=cfg.embed_subtitles??true;
  document.getElementById('cfgEmbedSub').checked=es;
  document.getElementById('cfgEmbedSubLabel').textContent=es?'ON':'OFF';
  const mu=cfg.mega_upload??false;
  document.getElementById('cfgMegaUpload').checked=mu;
  document.getElementById('cfgMegaUploadLabel').textContent=mu?'ON':'OFF';
  document.getElementById('cfgMegaFolder').value=cfg.mega_folder||'/whowatch';
  if (cfg.whowatch_cookie) document.getElementById('cfgCookie').placeholder='設定済み（非表示）';
  document.getElementById('cfgDeviceId').value=cfg.whowatch_device_id||'';
}

['cfgComments','cfgEmbedSub','cfgMegaUpload'].forEach(id => {
  document.getElementById(id).addEventListener('change', function() {
    document.getElementById(id+'Label').textContent = this.checked?'ON':'OFF';
  });
});

// ── API ──
async function addStreamer() {
  const input=document.getElementById('addInput'), val=input.value.trim(); if(!val)return;
  const res=await post('/api/streamer/add',{user_path:val});
  if(res.ok){toast('追加: '+val,'ok');input.value='';}else toast(res.error||'エラー','err');
}
async function removeStreamer(up){if(!confirm(`${up} を削除?`))return;await post('/api/streamer/remove',{user_path:up});toast('削除','ok');}
async function testStreamer(up){toast('確認中...','');const res=await post('/api/streamer/test',{user_path:up});if(res.live)toast(`✅ 配信中 live_id=${res.live_id}`,'ok');else toast(`❌ オフライン: ${up}`,'err');}
async function startRec(up){await post('/api/record/start',{user_path:up});toast('録画開始','ok');}
async function stopRec(up){await post('/api/record/stop',{user_path:up});toast('停止','ok');}
async function browseFolder(){const res=await post('/api/browse_folder',{});if(res.path)document.getElementById('cfgOutputDir').value=res.path;}
async function openFolder(){await post('/api/open_folder',{});}

async function saveConfig(){
  const cfg={
    check_interval:  parseInt(document.getElementById('cfgInterval').value),
    quality:         document.getElementById('cfgQuality').value,
    output_dir:      document.getElementById('cfgOutputDir').value,
    save_comments:   document.getElementById('cfgComments').checked,
    embed_subtitles: document.getElementById('cfgEmbedSub').checked,
    whowatch_cookie: document.getElementById('cfgCookie').value,
    whowatch_device_id: document.getElementById('cfgDeviceId').value,
    mega_upload:     document.getElementById('cfgMegaUpload').checked,
    mega_folder:     document.getElementById('cfgMegaFolder').value||'/whowatch',
  };
  const res=await post('/api/config/save',cfg);
  if(res.ok){toast('設定を保存しました','ok');if(res.config)renderConfig(res.config);}
}

// ── ログ ──
function appendLog(e){
  const wrap=document.getElementById('logWrap');
  const el=document.createElement('div');el.className=`log-entry ${e.level}`;
  el.innerHTML=`<span class="log-time">${e.time}</span><span class="log-msg">${esc(e.msg)}</span>`;
  wrap.appendChild(el);wrap.scrollTop=wrap.scrollHeight;
  if(wrap.children.length>300)wrap.removeChild(wrap.firstChild);
}
function clearLog(){document.getElementById('logWrap').innerHTML='';}

// ── ユーティリティ ──
async function post(url,body){const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return r.json();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let _tt;
function toast(msg,type){const e=document.getElementById('toast');e.textContent=msg;e.className=`show ${type}`;clearTimeout(_tt);_tt=setTimeout(()=>e.className=type,2500);}

// ── 初期ロード ──
(async()=>{
  const data=await fetch('/api/status').then(r=>r.json());
  renderStreamerList(data.streamers,data.recording);
  renderConfig(data.config);
  updateLiveTabs(data.recording);
  document.getElementById('statStreamers').textContent=data.streamers.length;
  document.getElementById('statRecording').textContent=data.recording.length;
  const logs=await fetch('/api/logs').then(r=>r.json());
  logs.forEach(e=>appendLog(e));
})();
</script>
</body>
